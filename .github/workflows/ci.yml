name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # pnpm must be installed before setup-node so that `cache: 'pnpm'` can
      # resolve the store path. Using setup-node's built-in cache avoids the
      # fragile `pnpm store path` step, which returned an empty path under the
      # `frontend` working-directory default and broke fork-PR runs.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Design system compliance
        run: pnpm check:design-system:strict

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

  migrations:
    name: Migration Graph Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Fails the PR if the Alembic chain has multiple heads, a dangling
      # down_revision, or duplicate ids - the recurring cause of Railway
      # deploy failures ("Multiple head revisions are present"). Pure stdlib,
      # no database or dependencies required.
      - name: Check single migration head
        run: python backend/scripts/check_migration_heads.py

  scripts:
    name: Scripts Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  migration-exec:
    name: Migration Execution (PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # The `migrations` job above statically validates the migration *graph*
    # (single head, no dangling parents). This job validates migration
    # *execution*: production runs PostgreSQL, but dev/tests run SQLite and the
    # app builds its dev schema via Base.metadata.create_all - so migration
    # files are only ever executed against Postgres on deploy. That hides a
    # whole class of dialect bugs (e.g. `BOOLEAN DEFAULT 0`, which SQLite
    # accepts and Postgres rejects). Running the real chain against Postgres
    # here surfaces them at PR time instead of in a failed Railway deploy.
    services:
      postgres:
        # Pinned to match the Railway production Postgres major version (17),
        # so version-specific dialect behavior is exercised the same way.
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raidplanner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # The load-bearing guard: run the full migration chain against a real
      # PostgreSQL engine, exactly as production does on deploy.
      - name: Run migrations against PostgreSQL
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raidplanner
        run: alembic upgrade head

      # Migrations must be reversible. Walk the whole chain back down to base
      # then re-apply, so a broken downgrade() is caught here rather than when
      # someone needs to roll back a production deploy.
      - name: Verify migration downgrade/upgrade round-trip
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raidplanner
        run: |
          alembic downgrade base
          alembic upgrade head

      # NOTE: backend pytest is intentionally NOT run here yet. Several tests
      # (test_security SSRF, test_httponly_cookies) are not clean in a sandboxed
      # CI runner - they depend on outbound network behavior and fail/err there
      # while passing locally. Wiring up backend tests in CI is worthwhile but
      # needs those tests hardened first; tracked as follow-up.
