name: Release Notes Reminder

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check:
    name: Check Release Notes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check for release notes
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });

              const hasReleaseNotes = files.some(f =>
                f.filename === 'frontend/src/data/releaseNotes.ts'
              );

              const labels = context.payload.pull_request.labels.map(l => l.name);
              const skipLabel = labels.includes('skip-release-notes');

              if (!hasReleaseNotes && !skipLabel) {
                // Check if we already commented
                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number
                });

                const botComment = comments.find(c =>
                  (c.user.type === 'Bot' || c.user.login === 'github-actions[bot]') &&
                  typeof c.body === 'string' &&
                  c.body.includes('<!-- release-notes-reminder-bot -->')
                );

                if (!botComment) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: `<!-- release-notes-reminder-bot -->
**Release notes reminder**

This PR doesn't appear to update release notes. If this PR includes user-facing changes, please update \`frontend/src/data/releaseNotes.ts\`.

Add the \`skip-release-notes\` label to dismiss this reminder.`
                  });
                }
              }
            } catch (error) {
              // Log the error but don't fail the workflow - this is a non-blocking reminder
              console.error(`Release notes reminder failed: ${error.message}`);
            }
