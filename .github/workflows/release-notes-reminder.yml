name: Release Notes Check

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  check:
    name: Release Notes Required
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check for release notes
        uses: actions/github-script@v7
        with:
          script: |
            // Use pagination to handle PRs with >30 files
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            // Check if release notes were updated
            const hasReleaseNotes = files.some(f =>
              f.filename === 'frontend/src/data/releaseNotes.ts'
            );

            // Check for skip label
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const skipLabel = labels.includes('skip-release-notes');

            // Patterns that don't require release notes
            const excludePatterns = [
              /^\.github\//,           // CI/workflow configs
              /^docs\//,               // Documentation
              /^.*\.md$/i,             // Markdown files
              /^.*\.test\.[jt]sx?$/,   // Test files
              /^.*\.spec\.[jt]sx?$/,   // Spec files
              /^.*__tests__\/.*/,      // Test directories
              /^frontend\/public\//,   // Static assets
              /^scripts\//,            // Build/utility scripts
              /^.*\.json$/,            // Config files (package.json, etc.)
              /^.*\.ya?ml$/,           // YAML configs
              /^.*\.lock$/,            // Lock files
            ];

            // Check if PR has meaningful code changes
            const hasCodeChanges = files.some(f => {
              // Skip excluded patterns
              if (excludePatterns.some(p => p.test(f.filename))) {
                return false;
              }
              // Check for actual source code changes
              return (
                f.filename.startsWith('frontend/src/') ||
                f.filename.startsWith('backend/app/')
              );
            });

            console.log(`Files changed: ${files.length}`);
            console.log(`Has release notes: ${hasReleaseNotes}`);
            console.log(`Has code changes: ${hasCodeChanges}`);
            console.log(`Skip label: ${skipLabel}`);

            // If no code changes, pass without needing release notes
            if (!hasCodeChanges) {
              console.log('No code changes detected - release notes not required');
              return;
            }

            // If skip label is present, pass
            if (skipLabel) {
              console.log('skip-release-notes label present - bypassing check');
              return;
            }

            // If has release notes, validate that items include commits
            if (hasReleaseNotes) {
              const { data: fileContent } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'frontend/src/data/releaseNotes.ts',
                ref: context.payload.pull_request.head.sha,
              });

              const content = Buffer.from(fileContent.content, 'base64').toString('utf-8');

              // Extract the first (latest) release from the RELEASES array
              const releasesMatch = content.match(/export const RELEASES:\s*Release\[\]\s*=\s*\[([\s\S]*?)^\];/m);
              if (releasesMatch) {
                // Find items without commits in the first release block
                // Match the first release object (up to the next version declaration or end)
                const firstReleaseMatch = releasesMatch[1].match(/\{\s*version:\s*['"][^'"]+['"][\s\S]*?items:\s*\[([\s\S]*?)\],?\s*\}/);

                if (firstReleaseMatch) {
                  const itemsContent = firstReleaseMatch[1];

                  // Find items - look for category/title pairs
                  const itemPattern = /\{\s*category:\s*['"]([^'"]+)['"],\s*title:\s*['"]([^'"]+)['"]/g;
                  const commitPattern = /commits:\s*\[/g;

                  // Count items and commits arrays
                  const items = [...itemsContent.matchAll(itemPattern)];
                  const commits = [...itemsContent.matchAll(commitPattern)];

                  console.log(`Found ${items.length} items and ${commits.length} commit arrays in latest release`);

                  if (items.length > 0 && commits.length < items.length) {
                    // Find which items are missing commits
                    const itemTitles = items.map(m => m[2]);

                    // Post a comment about missing commits
                    const { data: comments } = await github.rest.issues.listComments({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: context.issue.number
                    });

                    const commitBotComment = comments.find(c =>
                      (c.user.type === 'Bot' || c.user.login === 'github-actions[bot]') &&
                      typeof c.body === 'string' &&
                      c.body.includes('<!-- release-notes-commits-check -->')
                    );

                    if (!commitBotComment) {
                      const commentBody = [
                        '<!-- release-notes-commits-check -->',
                        '**Release notes items missing commits**',
                        '',
                        `Found ${items.length} items but only ${commits.length} have commit references.`,
                        '',
                        'Each item in `releaseNotes.ts` should include a `commits` array:',
                        '```typescript',
                        '{',
                        "  category: 'feature',",
                        "  title: 'My feature',",
                        "  description: 'What it does',",
                        '  commits: [{ hash: \'abc1234\', message: \'feat: my feature\' }],',
                        '}',
                        '```',
                        '',
                        'Use `git log --oneline` to find the relevant commit hashes.',
                      ].join('\n');

                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: commentBody,
                      });
                    }

                    core.setFailed(`Release notes items missing commits: ${items.length} items but only ${commits.length} have commit references.`);
                    return;
                  }
                }
              }
            }

            // If code changes but no release notes, fail
            if (!hasReleaseNotes) {
              // Post a helpful comment if we haven't already
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });

              const botComment = comments.find(c =>
                (c.user.type === 'Bot' || c.user.login === 'github-actions[bot]') &&
                typeof c.body === 'string' &&
                c.body.includes('<!-- release-notes-check-bot -->')
              );

              if (!botComment) {
                const commentBody = [
                  '<!-- release-notes-check-bot -->',
                  '**Release notes required**',
                  '',
                  'This PR includes code changes but doesn\'t update release notes.',
                  '',
                  'Please update `frontend/src/data/releaseNotes.ts` with:',
                  '1. Bump `CURRENT_VERSION` if this is a new release',
                  '2. Add items to the `items` array describing the changes',
                  '',
                  'If this PR doesn\'t need release notes (e.g., internal refactoring), add the `skip-release-notes` label.',
                ].join('\n');

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody,
                });
              }

              core.setFailed('Release notes required for code changes. Update frontend/src/data/releaseNotes.ts or add skip-release-notes label.');
            }

            console.log('Release notes check passed');
