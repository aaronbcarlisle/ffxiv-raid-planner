name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Skip bot-authored PRs (Railway, Dependabot, etc.): the action blocks
    # non-human actors, and automated PRs aren't worth an AI review.
    #
    # Also skip PRs from forks: GitHub does not grant OIDC id-tokens or repo
    # secrets to fork PRs, so this job cannot authenticate and would fail. The
    # job-level `if` makes it report as "skipped" (which does not block required
    # checks) instead of failing on contributor fork PRs.
    if: >-
      github.event.pull_request.user.type != 'Bot' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
